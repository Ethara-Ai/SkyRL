# Phase 13 + 18 — K8s Deployment for the long-running vLLM policy server.
# Single deployment; horizontal scaling via replicas (the OpenAI router
# fronts multiple pods for load balancing).

apiVersion: apps/v1
kind: Deployment
metadata:
  name: milo-policy-server
  labels: { app: milo, role: policy-server }
spec:
  replicas: 1
  selector:
    matchLabels: { app: milo, role: policy-server }
  template:
    metadata:
      labels: { app: milo, role: policy-server }
    spec:
      containers:
        - name: vllm
          image: ${MILO_GYM_IMAGE:-ethara/milo-gym:latest}
          command: ["/bin/bash", "-lc"]
          args:
            - >
              python -m vllm.entrypoints.openai.api_server
              --model $MILO_MODEL_PATH
              --tensor-parallel-size $MILO_TP_SIZE
              --max-model-len $MILO_MAX_MODEL_LEN
              --port 8000
              --enable-prefix-caching
              --gpu-memory-utilization 0.92
              --dtype bfloat16
          env:
            - name: MILO_MODEL_PATH
              value: "/ckpts/qwen2.5-coder-32b-milo-rl-v1"
            - name: MILO_TP_SIZE
              value: "4"
            - name: MILO_MAX_MODEL_LEN
              value: "65536"
          ports:
            - { containerPort: 8000, name: openai }
          readinessProbe:
            httpGet: { path: /v1/models, port: 8000 }
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: "16"
              memory: "128Gi"
              nvidia.com/gpu: "4"
            limits:
              nvidia.com/gpu: "4"
          volumeMounts:
            - { name: ckpt, mountPath: /ckpts }
        - name: hot-reload
          image: ${MILO_GYM_IMAGE:-ethara/milo-gym:latest}
          command:
            - python
            - -m
            - milo.serving.hot_reload
            - --scratch-dir
            - /scratch
            - --vllm-port
            - "8000"
          volumeMounts:
            - { name: scratch, mountPath: /scratch }
      volumes:
        - name: ckpt
          persistentVolumeClaim: { claimName: milo-ckpt-pvc }
        - name: scratch
          emptyDir: { sizeLimit: 100Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: milo-policy-server
spec:
  selector: { app: milo, role: policy-server }
  ports:
    - { port: 80, targetPort: 8000, name: openai }
  type: ClusterIP
