# Phase 18 — K8s Job spec for Milo RL training (alternative to Slurm).
# Parameterised via env vars; mirror what milo/slurm/train.slurm reads.
#
# Apply with: kubectl apply -f milo/k8s/train.yaml
#
# Adaptability: every infra knob is in env. AGIF / any client can
# tweak resource requests, node selectors, tolerations without touching the
# milo code.

apiVersion: batch/v1
kind: Job
metadata:
  name: milo-rl-training
  labels:
    app: milo
    phase: rl-training
spec:
  backoffLimit: 3                # plan §28.2 — Slurm-style requeue equivalent
  template:
    metadata:
      labels:
        app: milo
        phase: rl-training
    spec:
      restartPolicy: OnFailure
      containers:
        - name: trainer
          image: ${MILO_TRAINER_IMAGE:-ethara/milo-trainer:latest}
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-lc"]
          args:
            - >
              cd /workspace/SkyRL &&
              uv run --isolated --extra fsdp --extra miniswe -m milo.lht_adapter.main_milo
              data.train_data="['$MILO_DATA_DIR/train.parquet']"
              data.val_data="['$MILO_DATA_DIR/validation.parquet']"
              trainer.algorithm.advantage_estimator=grpo
              trainer.algorithm.policy_loss_type=milo_grpo
              trainer.policy.model.path=$MILO_BASE_MODEL
              trainer.strategy=fsdp
              trainer.placement.policy_num_gpus_per_node=$MILO_GPUS_PER_NODE
              trainer.placement.policy_num_nodes=$MILO_NNODES
              +trainer.algorithm.beta_kl_initial=$MILO_BETA_KL_INITIAL
              +trainer.algorithm.beta_kl_final=$MILO_BETA_KL_FINAL
              +trainer.algorithm.beta_kl_anneal_steps=$MILO_BETA_KL_ANNEAL_STEPS
              trainer.ckpt_path=$MILO_CKPT_DIR
              trainer.ckpt_interval=50
              trainer.logger=$MILO_LOGGER
          env:
            - name: MILO_BASE_MODEL
              value: "Qwen/Qwen2.5-Coder-32B-Instruct"
            - name: MILO_BETA_KL_INITIAL
              value: "0.01"          # v0.4 default
            - name: MILO_BETA_KL_FINAL
              value: "0.005"
            - name: MILO_BETA_KL_ANNEAL_STEPS
              value: "4800"
            - name: MILO_GPUS_PER_NODE
              value: "8"
            - name: MILO_NNODES
              value: "2"
            - name: MILO_LOGGER
              value: "wandb"
            - name: WANDB_API_KEY
              valueFrom:
                secretKeyRef: { name: milo-secrets, key: wandb-api-key }
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef: { name: milo-secrets, key: hf-token }
            - name: EVAL_DOCKER_IMAGE_PREFIX
              value: "426628337772.dkr.ecr.ap-south-1.amazonaws.com/rfp-coding-q1"
            - name: AWS_REGION
              value: "ap-south-1"
          resources:
            requests:
              cpu: "32"
              memory: "256Gi"
              nvidia.com/gpu: "8"
            limits:
              nvidia.com/gpu: "8"
          volumeMounts:
            - { name: data,     mountPath: /workspace/data }
            - { name: ckpt,     mountPath: /workspace/ckpts }
            - { name: scratch,  mountPath: /workspace/scratch }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: milo-data-pvc }
        - name: ckpt
          persistentVolumeClaim: { claimName: milo-ckpt-pvc }
        - name: scratch
          emptyDir: { sizeLimit: 200Gi }
      tolerations:
        - { key: "nvidia.com/gpu", operator: "Exists", effect: "NoSchedule" }
