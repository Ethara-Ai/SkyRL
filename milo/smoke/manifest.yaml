# Smoke pack manifest — spec §10.2 + plan §9.2.
#
# Five hand-picked tasks across Python / TypeScript / Go (the three
# simplest container builds per plan §9.2). Composition per prompt:
#   1 trivial, 2 medium, 1 hard, 1 unsolvable.
#
# Each task's expected_tier is the Phase 8 calibration result that the
# tier-stability test asserts against (spec §10.2 wall-clock SLA: under
# 10 minutes end-to-end on a developer laptop).
#
# Updating this manifest requires re-running Phase 8 calibration on the
# tasks named below and confirming the expected_tier hasn't drifted.

schema_version: "milo-smoke/1.0"
description: "5-task smoke pack — install + container + verifier + judge + adapter."
wall_clock_budget_seconds: 600

tasks:
  - instance_id: "python_print_fix"
    lang: "python"
    expected_tier: "trivial"
    description: "Trivial 1-line print/format fix; smoke-pack baseline (plan §9.2 row 1)."

  - instance_id: "python_off_by_one"
    lang: "python"
    expected_tier: "medium"
    description: "Single-index off-by-one bug; medium-tier exemplar (plan §9.2 row 2)."

  - instance_id: "ts_null_check"
    lang: "typescript"
    expected_tier: "medium"
    description: "Missing null-safety guard in a typed TS handler (plan §9.2 row 3)."

  - instance_id: "go_error_handling"
    lang: "go"
    expected_tier: "hard"
    description: "Multi-call missing err-handling pattern in idiomatic Go (plan §9.2 row 4)."

  - instance_id: "unresolvable_lorem"
    lang: "python"
    expected_tier: "unsolvable"
    description: "Deliberately-impossible task; exercises lower-bound of difficulty calibration (plan §9.2 row 5)."
