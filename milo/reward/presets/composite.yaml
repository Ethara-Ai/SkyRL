# Composite reward preset — spec §4.4 / D-1 / plan §25.5.
#
# Hybrid verifier-grounded composite reward (R2E-Gym-style: shaping + rubric
# on top of the terminal RLVR signal). This is the default the gym smoke
# tests run against.
#
# Weight defaults are flagged provisional in spec v0.7: §24 ablations A7
# (beta sweep), A8 (lambda sweep), A9 (alpha sweep) verify empirically.
# beta=0.20 in particular is called out as aggressive given judge-model
# noise. Override per-run via Hydra; do not silently retune the shipped
# preset.

preset: composite
alpha: 0.05    # per-step shaping weight (spec §4.4)
beta:  0.20    # rubric weight (spec §4.4)
lambda: 2.0    # per-step regression asymmetry (spec §4.4.2)
gamma: 0.0     # TIR weight (spec §4.4.7) — opt-in, default 0
